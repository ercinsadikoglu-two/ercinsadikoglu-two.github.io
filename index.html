<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ercin Sadikoglu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #ffe84a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      padding: 40px 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* TOP */
    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 80px;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 120px;
    }

    .hero h1 {
      font-size: clamp(120px, 18vw, 240px);
      margin: 0;
      letter-spacing: -0.06em;
    }

    .hero p {
      margin-top: 30px;
      font-size: 24px;
      line-height: 1.4;
      opacity: 0.8;
    }

    /* SECTIONS */
    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
    }

    .section {
      text-align: center;
    }

    .section h2 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: -0.03em;
    }

    .section p {
      font-size: 18px;
      line-height: 1.5;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .link {
      display: inline-block;
      margin-top: 10px;
      font-size: 14px;
      border-bottom: 1px solid #ffe84a;
      padding-bottom: 2px;
    }

    .link:hover {
      opacity: 0.7;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .sections {
        grid-template-columns: 1fr;
        gap: 60px;
      }

      .hero h1 {
        font-size: clamp(80px, 22vw, 140px);
      }

      .hero p {
        font-size: 18px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TOP -->
    <div class="topbar">
      <div>ERCIN SADIKOGLU</div>
      <div>Two.</div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>Two.</h1>
      <p>
        Bildiğin iki şey birleşir.<br>
        Bir fikir olur.
      </p>
    </div>

    <!-- SECTIONS -->
    <div class="sections">

      <!-- REKLAMCI -->
      <div class="section">
        <h2>Reklamcı</h2>
        <p>
          Kampanyalar, sunumlar ve marka fikirleri.
          Yıllar içinde üretilmiş işler.
        </p>
        <a class="link" href="https://www.behance.net/ercinsadikoglu" target="_blank">
          Behance'e Git
        </a>
      </div>

      <!-- SENARİST -->
      <div class="section">
        <h2>Senarist</h2>
        <p>
          Yazdığım senaryolar, geliştirdiğim projeler
          ve anlatı dünyaları.
        </p>
        <a class="link" href="#sinema">
          Filmleri Gör
        </a>
      </div>

    </div>

  </div>

</body>
</html>
